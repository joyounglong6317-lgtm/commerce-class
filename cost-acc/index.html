              { question: "기초재공품의 기완성도를 인정하여 당기 투입원가와 명확히 구분하고, 순수한 '당기 작업량'만을 기준으로 환산량을 구하는 방법은?", options: ["평균법", "선입선출법", "후입선출법", "단일배분법"], answer: 1, explanation: "기초재공품을 먼저 가공하여 완성시킨다고 가정하는 '선입선출법'은 전기 작업분과 당기 작업분을 엄격히 분리하여 정확도가 높습니다." },
              { question: "평균법에 의한 완성품환산량과 선입선출법에 의한 완성품환산량의 결과값이 정확히 일치하게 되는 조건은?", options: ["당기 착수량이 없을 때", "기말재공품이 없을 때", "기초재공품이 전혀 없을 때", "기초재공품과 기말재공품의 수량이 같을 때"], answer: 2, explanation: "두 방법의 차이는 기초재공품을 어떻게 처리하느냐에 있으므로, 만약 공정에 기초재공품이 하나도 없다면 두 방법의 계산 결과는 동일해집니다." },
              { question: "종합원가계산을 적용하기에 가장 적합한 업종들로 묶인 것은?", options: ["조선업, 항공기제조", "주문제작가구, 기계제작", "건설업, 인테리어업", "정유업, 시멘트공업, 제지업"], answer: 3, explanation: "종합원가계산은 정유, 시멘트, 제지, 밀가루 제분 등 똑같은 제품을 공정을 통해 연속적으로 대량 생산하는 업종에 맞습니다." },
              { question: "재료가 공정 착수 시점(초기)에 100% 전량 투입될 경우, 진척도가 40%인 기말재공품의 '재료비 완성도'는 몇 %인가?", options: ["100%", "40%", "0%", "60%"], answer: 0, explanation: "공정 초기에 재료가 모두 부어졌으므로 미완성된 40% 지점의 재공품이라 할지라도 재료만큼은 이미 100% 투입된 상태입니다." },
              { question: "비정상공손원가의 올바른 회계처리 방법은 무엇인가?", options: ["완성품원가에 모두 더한다.", "영업외비용으로 즉시 처리(비용화)한다.", "기말재공품원가에만 더한다.", "완성품과 기말재공품에 비율대로 나눠 배분한다."], answer: 1, explanation: "비정상공손은 통제 불가능한 상황이 아닌 작업자 부주의 등으로 발생한 손실이므로 원가에 가산하지 않고 당기의 영업외비용으로 털어냅니다." },
              { question: "결합제품(연산품) 원가계산 시, 분리점(완성점)에서 각 제품을 시장에 내다 팔았을 때 받을 수 있는 금액의 비율로 원가를 나누는 방법은?", options: ["상대적 판매가치법", "물량기준법", "순실현가능가치법", "이중배분율법"], answer: 0, explanation: "분리점에서의 시장 판매가치(상대적 판매가치) 비율에 따라 결합원가를 배분하는 것을 '상대적 판매가치법'이라고 합니다." },
              { question: "제품 제조 공정에서 동일한 원재료를 투입했는데 어쩔 수 없이 두 종류 이상의 서로 다른 제품이 동시에 쏟아져 나올 때, 이 제품들을 일컫는 말은?", options: ["공손품", "불량품", "작업폐물(Scrap)", "결합제품(연산품)"], answer: 3, explanation: "원유를 끓이면 휘발유, 경유, 등유가 같이 나오는 것처럼 동일 원재료/공정에서 필연적으로 함께 생산되는 제품을 결합제품(연산품)이라 합니다." }
            ]
          }
        ];

        function App() {
          const [selectedChapter, setSelectedChapter] = useState(curriculumData[0]);
          const [quizMode, setQuizMode] = useState(false);
          const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
          const [selectedOption, setSelectedOption] = useState(null);
          const [isSubmitted, setIsSubmitted] = useState(false);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [sidebarOpen, setSidebarOpen] = useState(true);

          // --- 보상 및 학습 현황(XP/레벨/뱃지) 상태 ---
          const [userXP, setUserXP] = useState(0);
          const [userLevel, setUserLevel] = useState(1);
          const [chapterRecords, setChapterRecords] = useState({});
          const [earnedBadges, setEarnedBadges] = useState([]); 
          const [showLevelUp, setShowLevelUp] = useState(false);

          // 경험치 추가 및 레벨업 체크 함수
          const addXP = (amount) => {
            setUserXP(prev => {
              const newXP = prev + amount;
              const currentLv = Math.floor(prev / 100) + 1;
              const newLevel = Math.floor(newXP / 100) + 1;
              
              if (newLevel > currentLv) {
                setUserLevel(newLevel);
                setShowLevelUp(true);
                setTimeout(() => setShowLevelUp(false), 3000); 
              }
              return newXP;
            });
          };

          // --- 게임 모드 상태 ---
          const [gameActive, setGameActive] = useState(false);
          const [gameStatus, setGameStatus] = useState('idle'); 
          const [gameTime, setGameTime] = useState(60);
          const [gameScore, setGameScore] = useState(0);
          const [gameCombo, setGameCombo] = useState(0);
          const [gameMaxCombo, setGameMaxCombo] = useState(0);
          const [mixedQuestions, setMixedQuestions] = useState([]);
          const [gameQIdx, setGameQIdx] = useState(0);
          const [gameFeedback, setGameFeedback] = useState(null);

          useEffect(() => {
            if (gameStatus === 'over') {
              if (gameScore >= 300 && !earnedBadges.includes('game_master')) {
                setEarnedBadges(prev => [...prev, 'game_master']);
                addXP(100); 
              }
            }
          }, [gameStatus, gameScore]);

          useEffect(() => {
            let timer;
            if (gameActive && gameStatus === 'playing') {
              timer = setInterval(() => {
                setGameTime(prev => {
                  if (prev <= 1) {
                    setGameStatus('over');
                    return 0;
                  }
                  return prev - 1;
                });
              }, 1000);
            }
            return () => clearInterval(timer);
          }, [gameActive, gameStatus]);

          const handleChapterSelect = (chapter) => {
            setSelectedChapter(chapter);
            setQuizMode(false);
            setGameActive(false);
            resetQuiz();
            if (window.innerWidth < 768) setSidebarOpen(false); 
          };

          const startQuiz = () => {
            setQuizMode(true);
            resetQuiz();
          };

          const resetQuiz = () => {
            setCurrentQuestionIdx(0);
            setSelectedOption(null);
            setIsSubmitted(false);
            setScore(0);
            setShowResult(false);
          };

          const handleOptionSelect = (index) => {
            if (isSubmitted) return;
            setSelectedOption(index);
          };

          const handleSubmit = () => {
            if (selectedOption === null) return;
            
            setIsSubmitted(true);
            const isCorrect = selectedOption === selectedChapter.questions[currentQuestionIdx].answer;
            if (isCorrect) {
              setScore(score + 1);
              addXP(10); 
            }
          };

          const handleNextQuestion = () => {
            if (currentQuestionIdx < selectedChapter.questions.length - 1) {
              setCurrentQuestionIdx(currentQuestionIdx + 1);
              setSelectedOption(null);
              setIsSubmitted(false);
            } else {
              const currentBest = chapterRecords[selectedChapter.id] || 0;
              if (score > currentBest) {
                setChapterRecords(prev => ({...prev, [selectedChapter.id]: score}));
              }
              
              if (score === selectedChapter.questions.length && !earnedBadges.includes(`perfect_ch${selectedChapter.id}`)) {
                setEarnedBadges(prev => [...prev, `perfect_ch${selectedChapter.id}`]);
                addXP(50); 
              }
              setShowResult(true);
            }
          };

          const startFinalGame = () => {
            let allQ = [];
            curriculumData.forEach(ch => {
              ch.questions.forEach(q => {
                allQ.push({ ...q, chapterTitle: ch.title });
              });
            });
            allQ = allQ.sort(() => Math.random() - 0.5).slice(0, 20);

            setMixedQuestions(allQ);
            setGameActive(true);
            setGameStatus('playing');
            setGameTime(60); 
            setGameScore(0);
            setGameCombo(0);
            setGameMaxCombo(0);
            setGameQIdx(0);
            setGameFeedback(null);
            setQuizMode(false);
            setSelectedChapter(null);
            if (window.innerWidth < 768) setSidebarOpen(false);
          };

          const handleGameOption = (idx) => {
            if (gameStatus !== 'playing' || gameFeedback !== null) return;
            const currentQ = mixedQuestions[gameQIdx];
            const isCorrect = idx === currentQ.answer;

            if (isCorrect) {
              setGameScore(prev => prev + 10 + (gameCombo * 5));
              addXP(5); 
              setGameCombo(prev => {
                const newCombo = prev + 1;
                if (newCombo > gameMaxCombo) setGameMaxCombo(newCombo);
                return newCombo;
              });
              setGameTime(prev => prev + 3); 
              setGameFeedback({ type: 'correct', msg: '정답! +3초' });
            } else {
              setGameCombo(0); 
              setGameTime(prev => Math.max(0, prev - 5)); 
              setGameFeedback({ type: 'wrong', msg: '오답! -5초' });
            }

            setTimeout(() => {
              setGameFeedback(null);
              if (gameQIdx < mixedQuestions.length - 1) {
                setGameQIdx(prev => prev + 1);
              } else {
                setGameStatus('over'); 
              }
            }, 600);
          };

          const renderSidebar = () => (
            <div className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300 ease-in-out md:relative md:translate-x-0 overflow-y-auto flex flex-col`}>
              <div className="p-6 pb-2">
                <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                  <i className="fas fa-book-open text-indigo-400"></i>
                  전산세무 2급
                </h2>
                
                <div className="bg-slate-800 p-4 rounded-2xl mb-6 shadow-inner border border-slate-700 relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-2 opacity-10">
                    <i className="fas fa-medal text-6xl"></i>
                  </div>
                  <div className="flex justify-between items-end mb-2 relative z-10">
                    <div className="font-bold flex items-center gap-2">
                      <div className="bg-indigo-500 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm shadow-[0_0_10px_rgba(99,102,241,0.6)]">
                        Lv.{userLevel}
                      </div>
                      <span className="text-sm">학습 레벨</span>
                    </div>
                    <span className="text-xs text-indigo-300 font-medium">{userXP % 100} / 100 XP</span>
                  </div>
                  <div className="h-2.5 bg-slate-900/50 rounded-full overflow-hidden mb-3 relative z-10 border border-slate-700/50">
                    <div 
                      className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-500 ease-out"
                      style={{ width: `${userXP % 100}%` }}
                    ></div>
                  </div>
                  <div className="flex gap-1.5 relative z-10">
                    {curriculumData.map(ch => {
                      const isPerfect = chapterRecords[ch.id] === ch.questions.length;
                      const isAttempted = chapterRecords[ch.id] > 0;
                      return (
                        <div 
                          key={ch.id} 
                          className={`flex-1 h-6 rounded flex items-center justify-center text-xs font-bold transition-colors ${isPerfect ? 'bg-amber-400 text-amber-900 shadow-[0_0_5px_rgba(251,191,36,0.5)]' : (isAttempted ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-500')}`}
                          title={`${ch.title} 최고점: ${chapterRecords[ch.id] || 0} / ${ch.questions.length}`}
                        >
                          {isPerfect ? <i className="fas fa-star text-xs"></i> : ch.id}
                        </div>
                      );
                    })}
                  </div>
                </div>

                <p className="text-slate-400 text-sm mb-2">단원별 학습</p>
              </div>
              
              <nav className="space-y-1 px-4 overflow-y-auto flex-1">
                {curriculumData.map((chapter) => (
                  <button
                    key={chapter.id}
                    onClick={() => handleChapterSelect(chapter)}
                    className={`w-full text-left px-4 py-3 rounded-xl transition-all duration-200 flex items-center justify-between group ${
                      !gameActive && selectedChapter?.id === chapter.id
                        ? 'bg-indigo-600 text-white shadow-md'
                        : 'text-slate-300 hover:bg-slate-800 hover:text-white'
                    }`}
                  >
                    <span className="text-sm font-medium leading-tight">{chapter.title}</span>
                    <i className={`fas fa-chevron-right text-xs opacity-0 group-hover:opacity-100 transition-opacity ${!gameActive && selectedChapter?.id === chapter.id ? 'opacity-100' : ''}`}></i>
                  </button>
                ))}
              </nav>

              <div className="p-6 border-t border-slate-700 bg-slate-900/50 mt-auto">
                <button
                  onClick={startFinalGame}
                  className={`w-full text-left px-4 py-4 rounded-xl transition-all duration-200 flex items-center justify-between group shadow-lg ${
                    gameActive
                      ? 'bg-gradient-to-r from-amber-500 to-orange-500 text-white'
                      : 'bg-slate-800 text-amber-400 hover:bg-slate-700 hover:text-amber-300'
                  }`}
                >
                  <div className="flex items-center gap-2">
                    <i className="fas fa-gamepad"></i>
                    <span className="font-bold">종합평가 게임</span>
                  </div>
                  <i className={`fas fa-chevron-right text-xs opacity-0 group-hover:opacity-100 transition-opacity ${gameActive ? 'opacity-100' : ''}`}></i>
                </button>
              </div>
            </div>
          );

          const renderStudyMode = () => (
            <div className="max-w-4xl mx-auto animate-in fade-in duration-500" style={{ animationName: 'fadeIn', animationDuration: '0.5s' }}>
              <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div className="bg-indigo-50 px-8 py-10 border-b border-indigo-100 relative overflow-hidden">
                  <div className="absolute right-[-20px] top-[-20px] opacity-10">
                    <i className="fas fa-book-open" style={{fontSize: '12rem'}}></i>
                  </div>
                  <h1 className="text-3xl font-extrabold text-slate-800 mb-2 relative z-10">{selectedChapter.title}</h1>
                  <p className="text-indigo-600 font-medium relative z-10">핵심 요약 노트</p>
                </div>
                <div className="p-8">
                  <ul className="space-y-4 mb-10">
                    {selectedChapter.summary.map((item, idx) => (
                      <li key={idx} className="flex gap-4 items-start text-slate-700 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <i className="fas fa-check-circle text-emerald-500 text-xl mt-0.5 flex-shrink-0"></i>
                        <span className="leading-relaxed">{item}</span>
                      </li>
                    ))}
                  </ul>
                  
                  <div className="flex justify-center border-t border-slate-100 pt-8">
                    <button
                      onClick={startQuiz}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 transition-colors shadow-sm hover:shadow-md"
                    >
                      <i className="fas fa-tasks"></i>
                      이 단원 기출 퀴즈 풀기
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );

          const renderQuizMode = () => {
            if (showResult) return renderResult();

            const currentQ = selectedChapter.questions[currentQuestionIdx];
            const totalQ = selectedChapter.questions.length;

            return (
              <div className="max-w-3xl mx-auto animate-in fade-in duration-500" style={{ animationName: 'fadeIn', animationDuration: '0.5s' }}>
                <div className="mb-6 flex items-center justify-between">
                  <button 
                    onClick={() => setQuizMode(false)}
                    className="text-slate-500 hover:text-slate-800 flex items-center gap-2 font-medium transition-colors"
                  >
                    <i className="fas fa-chevron-left text-sm"></i> 학습 노트로 돌아가기
                  </button>
                  <div className="bg-white px-4 py-1.5 rounded-full text-sm font-bold text-indigo-600 shadow-sm border border-indigo-50">
                    문제 {currentQuestionIdx + 1} / {totalQ}
                  </div>
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                  <div className="p-8 lg:p-10">
                    <h2 className="text-xl lg:text-2xl font-bold text-slate-800 leading-snug mb-8">
                      <span className="text-indigo-600 mr-2">Q.</span>
                      {currentQ.question}
                    </h2>

                    <div className="space-y-3">
                      {currentQ.options.map((opt, idx) => {
                        let btnStyle = "border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-indigo-50";
                        
                        if (isSubmitted) {
                          if (idx === currentQ.answer) {
                            btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-800 font-medium"; 
                          } else if (idx === selectedOption) {
                            btnStyle = "border-rose-300 bg-rose-50 text-rose-700"; 
                          } else {
                            btnStyle = "border-slate-200 text-slate-400 opacity-60"; 
                          }
                        } else if (selectedOption === idx) {
                          btnStyle = "border-indigo-500 ring-2 ring-indigo-200 bg-indigo-50 text-indigo-700 font-medium"; 
                        }

                        return (
                          <button
                            key={idx}
                            onClick={() => handleOptionSelect(idx)}
                            disabled={isSubmitted}
                            className={`w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 ${btnStyle} flex justify-between items-center`}
                          >
                            <span className="text-lg leading-relaxed">{opt}</span>
                            {isSubmitted && idx === currentQ.answer && <i className="fas fa-check-circle text-xl text-emerald-500"></i>}
                            {isSubmitted && idx === selectedOption && idx !== currentQ.answer && <i className="fas fa-times-circle text-xl text-rose-500"></i>}
                          </button>
                        );
                      })}
                    </div>

                    {isSubmitted && (
                      <div className={`mt-8 p-6 rounded-2xl border ${selectedOption === currentQ.answer ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`} style={{ animationName: 'fadeIn', animationDuration: '0.3s' }}>
                        <p className="font-bold mb-2 flex items-center gap-2 text-lg">
                          {selectedOption === currentQ.answer ? (
                            <><span className="text-emerald-600">정답입니다!</span> 🎉</>
                          ) : (
                            <><span className="text-rose-600">오답입니다.</span> 💦</>
                          )}
                        </p>
                        <p className="text-slate-700 leading-relaxed text-lg">{currentQ.explanation}</p>
                      </div>
                    )}
                  </div>

                  <div className="bg-slate-50 p-6 flex justify-end border-t border-slate-100">
                    {!isSubmitted ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedOption === null}
                        className={`px-8 py-4 rounded-xl font-bold transition-all ${
                          selectedOption !== null
                            ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm'
                            : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                        }`}
                      >
                        정답 확인하기
                      </button>
                    ) : (
                      <button
                        onClick={handleNextQuestion}
                        className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-xl font-bold shadow-sm transition-all flex items-center gap-2"
                      >
                        {currentQuestionIdx < totalQ - 1 ? '다음 문제 풀기' : '결과 보기'}
                        <i className="fas fa-chevron-right"></i>
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          const renderResult = () => {
            const total = selectedChapter.questions.length;
            const isPerfect = score === total;

            return (
              <div className="max-w-2xl mx-auto text-center animate-in zoom-in-95 duration-500" style={{ animationName: 'zoomIn', animationDuration: '0.5s' }}>
                <div className="bg-white p-10 lg:p-16 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
                  {isPerfect && (
                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amber-300 via-yellow-400 to-amber-500"></div>
                  )}
                  <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 ${isPerfect ? 'bg-amber-50' : 'bg-indigo-50'}`}>
                    {isPerfect ? <i className="fas fa-star text-amber-500 text-5xl"></i> : <i className="fas fa-award text-indigo-600 text-5xl"></i>}
                  </div>
                  <h2 className="text-3xl font-extrabold text-slate-800 mb-2">학습 완료!</h2>
                  <p className="text-slate-500 font-medium mb-8">'{selectedChapter.title}' 단원의 퀴즈를 모두 풀었습니다.</p>
                  
                  <div className={`rounded-2xl p-8 mb-10 border ${isPerfect ? 'bg-amber-50 border-amber-100' : 'bg-slate-50 border-slate-100'}`}>
                    <p className="text-slate-600 mb-2">최종 점수</p>
                    <div className={`text-5xl font-black ${isPerfect ? 'text-amber-600' : 'text-indigo-600'}`}>
                      {score} <span className={`text-2xl font-bold ${isPerfect ? 'text-amber-400' : 'text-slate-400'}`}>/ {total}</span>
                    </div>
                    {isPerfect ? (
                      <p className="text-amber-600 font-bold mt-4 flex items-center justify-center gap-2">
                        <i className="fas fa-star text-sm"></i> 
                        완벽하게 이해하셨네요! 만점 보너스 뱃지를 획득했습니다.
                      </p>
                    ) : (
                      <p className="text-slate-600 mt-4">틀린 문제는 오답 노트를 통해 다시 한번 개념을 복습해보세요.</p>
                    )}
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <button
                      onClick={() => setQuizMode(false)}
                      className="px-8 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors"
                    >
                      학습 노트 복습하기
                    </button>
                    <button
                      onClick={startQuiz}
                      className="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-sm"
                    >
                      퀴즈 다시 풀기
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderGameMode = () => {
            if (gameStatus === 'over') {
              const isMaster = gameScore >= 300;
              return (
                <div className="max-w-2xl mx-auto text-center animate-in zoom-in-95 duration-500 mt-10" style={{ animationName: 'zoomIn', animationDuration: '0.5s' }}>
                  <div className="bg-white p-10 lg:p-16 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
                    {isMaster && (
                       <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 via-orange-500 to-amber-500"></div>
                    )}
                    <div className="w-24 h-24 bg-gradient-to-br from-amber-400 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-orange-200">
                      <i className="fas fa-trophy text-white text-5xl"></i>
                    </div>
                    <h2 className="text-3xl font-extrabold text-slate-800 mb-2">게임 종료!</h2>
                    <p className="text-slate-500 font-medium mb-8">모든 단원의 종합평가가 끝났습니다.</p>
                    
                    <div className="bg-slate-50 rounded-2xl p-8 mb-6 border border-slate-100 grid grid-cols-2 gap-4">
                      <div className="text-center">
                        <p className="text-slate-500 mb-1 font-medium">최종 점수</p>
                        <p className="text-5xl font-black text-amber-600">{gameScore}</p>
                      </div>
                      <div className="text-center">
                        <p className="text-slate-500 mb-1 font-medium">최대 콤보</p>
                        <p className="text-5xl font-black text-orange-500">{gameMaxCombo}</p>
                      </div>
                    </div>
                    
                    {isMaster && (
                       <p className="text-orange-600 font-bold mb-8 flex items-center justify-center gap-2">
                         <i className="fas fa-medal"></i> 
                         훌륭합니다! 300점 이상 달성으로 '게임 마스터' 보너스 경험치를 획득했습니다!
                       </p>
                    )}

                    <button
                      onClick={startFinalGame}
                      className="px-8 py-4 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white font-bold rounded-xl transition-all shadow-md shadow-orange-200 flex items-center gap-2 justify-center w-full mx-auto text-lg"
                    >
                      <i className="fas fa-gamepad"></i>
                      다시 도전하기
                    </button>
                  </div>
                </div>
              );
            }

            const currentQ = mixedQuestions[gameQIdx];

            return (
              <div className="max-w-3xl mx-auto animate-in fade-in duration-500 mt-4" style={{ animationName: 'fadeIn', animationDuration: '0.5s' }}>
                <div className="mb-6 flex items-center justify-between bg-white p-4 lg:px-6 rounded-2xl shadow-sm border border-slate-100">
                  <div className="flex items-center gap-3 lg:gap-6">
                    <div className={`flex items-center gap-2 font-bold px-4 py-2 rounded-xl transition-colors ${gameTime <= 10 ? 'bg-rose-100 text-rose-600 animate-pulse' : 'bg-rose-50 text-rose-500'}`}>
                      <i className="fas fa-stopwatch text-xl"></i>
                      <span className="text-xl lg:text-2xl">{gameTime}초</span>
                    </div>
                    <div className="flex items-center gap-2 text-amber-600 font-bold bg-amber-50 px-4 py-2 rounded-xl">
                      <i className="fas fa-trophy text-xl"></i>
                      <span className="text-xl lg:text-2xl">{gameScore}점</span>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 text-orange-500 font-bold bg-orange-50 px-4 py-2 rounded-xl">
                    <i className="fas fa-bolt text-xl"></i>
                    <span className="text-xl lg:text-2xl">{gameCombo} Combo</span>
                  </div>
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden relative min-h-[400px]">
                  {gameFeedback && (
                    <div className={`absolute inset-0 z-10 flex items-center justify-center bg-white/85 backdrop-blur-sm animate-in fade-in duration-150`}>
                      <div className={`text-4xl lg:text-5xl font-black drop-shadow-md ${gameFeedback.type === 'correct' ? 'text-emerald-500' : 'text-rose-500'}`} style={{ animationName: 'zoomIn', animationDuration: '0.2s' }}>
                        {gameFeedback.msg}
                      </div>
                    </div>
                  )}

                  <div className="p-8 lg:p-10">
                    <div className="text-sm font-bold text-amber-600 mb-4 bg-amber-50 inline-block px-3 py-1.5 rounded-lg border border-amber-100">
                      {currentQ?.chapterTitle} (문제 {gameQIdx + 1} / 20)
                    </div>
                    <h2 className="text-xl lg:text-2xl font-bold text-slate-800 leading-snug mb-8">
                      <span className="text-amber-500 mr-2">Q.</span>
                      {currentQ?.question}
                    </h2>

                    <div className="space-y-3">
                      {currentQ?.options.map((opt, idx) => (
                        <button
                          key={idx}
                          onClick={() => handleGameOption(idx)}
                          disabled={gameFeedback !== null}
                          className="w-full text-left p-5 rounded-2xl border-2 border-slate-200 text-slate-700 hover:border-amber-400 hover:bg-amber-50 hover:text-amber-900 transition-all duration-200 font-medium shadow-sm hover:shadow active:scale-[0.98]"
                        >
                          {opt}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="flex h-screen bg-slate-50 font-sans overflow-hidden text-slate-900">
              <style>
                {`
                  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                  @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
                  @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
                `}
              </style>

              {showLevelUp && (
                <div className="fixed top-12 left-1/2 transform -translate-x-1/2 z-[100] bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-8 py-4 rounded-full shadow-[0_10px_40px_rgba(99,102,241,0.5)] flex items-center gap-3 border border-white/20" style={{ animationName: 'slideDown', animationDuration: '0.3s' }}>
                  <i className="fas fa-chart-line text-indigo-100 text-xl"></i>
                  <span className="font-bold text-lg">레벨 업! Lv.{userLevel} 달성</span>
                </div>
              )}

              {sidebarOpen && (
                <div 
                  className="fixed inset-0 bg-slate-900/50 z-40 md:hidden transition-opacity" 
                  onClick={() => setSidebarOpen(false)}
                ></div>
              )}

              {renderSidebar()}

              <div className="flex-1 flex flex-col h-full overflow-hidden relative">
                <header className="bg-white border-b border-slate-200 p-4 flex items-center md:hidden z-30 shrink-0">
                  <button 
                    onClick={() => setSidebarOpen(true)}
                    className="p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
                  >
                    <i className="fas fa-bars text-xl"></i>
                  </button>
                  <span className="ml-2 font-bold text-slate-800">전산세무 2급 학습</span>
                </header>

                <main className="flex-1 overflow-y-auto p-6 md:p-10 lg:p-12 relative z-10">
                  {gameActive ? renderGameMode() : (quizMode ? renderQuizMode() : renderStudyMode())}
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
