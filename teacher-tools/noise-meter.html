<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소음 측정기 · 스마트 수업 도구</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  .coin-container { perspective: 1000px; width: 150px; height: 150px; margin: 0 auto; }
  .coin { width: 100%; height: 100%; position: relative; transition: transform 3s cubic-bezier(0.4, 2, 0.2, 1); transform-style: preserve-3d; }
  .coin.flip-heads { transform: rotateY(1800deg); }
  .coin.flip-tails { transform: rotateY(1980deg); }
  .coin-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; border: 8px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .coin-front { background: linear-gradient(135deg, #fef08a 0%, #eab308 100%); color: #854d0e; border-color: #ca8a04; }
  .coin-back { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%); color: #334155; transform: rotateY(180deg); border-color: #64748b; }
  #drawing-container canvas { border-radius: 0.75rem; touch-action: none; display: block; }
  .bracket-connector { position: relative; }
  .bracket-connector::after { content: ''; position: absolute; right: -1rem; top: 50%; width: 1rem; border-bottom: 2px solid #cbd5e1; }
  
</style>
</head>
<body class="min-h-screen text-slate-800">

<!-- 상단 바 -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-5xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center text-slate-500 hover:text-indigo-600 transition-colors font-bold text-sm">
      <i class="fa-solid fa-arrow-left mr-2"></i> 도구 모음으로
    </a>
    <div class="flex items-center">
      <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 mr-2"><i class="fa-solid fa-volume-high"></i></div>
      <span class="font-bold text-slate-700">소음 측정기</span>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto p-4 md:p-8">
  
    <section id="tool-noise" class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200 text-center transition-colors duration-300">
      <div class="flex items-center justify-center mb-6">
        <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 mr-4"><i class="fa-solid fa-volume-high text-2xl"></i></div>
        <h2 class="text-3xl font-bold text-slate-800">학급 소음 신호등</h2>
      </div>
      <p class="text-slate-500 mb-10 text-sm md:text-base">게이지가 빨간색에 도달하면 배경이 붉어집니다.</p>
      <div class="max-w-lg mx-auto bg-slate-50 p-10 rounded-[2.5rem] border border-slate-200 shadow-inner mb-10">
        <div class="flex justify-center gap-8 mb-10">
          <div id="light-green" class="w-20 h-20 rounded-full bg-emerald-500 opacity-20 shadow-lg transition-all duration-300 border-4 border-slate-200"></div>
          <div id="light-yellow" class="w-20 h-20 rounded-full bg-amber-500 opacity-20 shadow-lg transition-all duration-300 border-4 border-slate-200"></div>
          <div id="light-red" class="w-20 h-20 rounded-full bg-rose-500 opacity-20 shadow-lg transition-all duration-300 border-4 border-slate-200"></div>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-10 overflow-hidden mb-4 relative shadow-inner">
          <div id="noiseLevelBar" class="bg-emerald-500 h-10 rounded-full transition-all duration-75 w-0"></div>
        </div>
        <div class="text-xl font-bold text-slate-600">현재 수치: <span id="noiseValue" class="text-2xl text-slate-800 ml-2">0</span></div>
      </div>
      <button onclick="window.toggleNoiseMeter()" id="btn-noise-toggle" class="bg-indigo-600 hover:bg-indigo-700 text-white text-lg font-bold py-4 px-10 rounded-2xl shadow-lg transition-all">
        <i class="fa-solid fa-microphone mr-2"></i> 마이크 켜기 / 측정 시작
      </button>
    </section>
</main>

<!-- 커스텀 모달 -->
<div id="customModal" class="hidden fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center backdrop-blur-sm">
  <div id="customModalContent" class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 opacity-0 transition-all duration-200">
    <div id="modalIcon" class="w-16 h-16 mx-auto bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl mb-4"><i class="fa-solid fa-bell"></i></div>
    <h3 id="modalTitle" class="text-xl font-bold mb-2 text-center text-slate-800">알림</h3>
    <p id="modalMessage" class="text-slate-600 mb-8 text-center text-sm md:text-base leading-relaxed"></p>
    <div class="flex justify-center gap-3" id="modalButtons"></div>
  </div>
</div>

<script>
  window.showModal = function(title, message, isConfirm = false, onConfirm = null) {
    const modal = document.getElementById('customModal'), content = document.getElementById('customModalContent'),
          btnContainer = document.getElementById('modalButtons'), iconEl = document.getElementById('modalIcon'),
          titleEl = document.getElementById('modalTitle'), msgEl = document.getElementById('modalMessage');
    titleEl.innerText = title; msgEl.innerHTML = message; btnContainer.innerHTML = '';
    if (isConfirm) {
      iconEl.className = "w-16 h-16 mx-auto bg-amber-100 text-amber-600 rounded-full flex items-center justify-center text-3xl mb-4";
      iconEl.innerHTML = '<i class="fa-solid fa-circle-question"></i>';
    } else {
      iconEl.className = "w-16 h-16 mx-auto bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl mb-4";
      iconEl.innerHTML = '<i class="fa-solid fa-bell"></i>';
    }
    const closeModal = () => { content.classList.remove('scale-100','opacity-100'); content.classList.add('scale-95','opacity-0'); setTimeout(()=>modal.classList.add('hidden'),200); };
    if (isConfirm) {
      const cancelBtn = document.createElement('button'); cancelBtn.className = "flex-1 bg-slate-100 text-slate-700 font-bold py-3 px-4 rounded-xl"; cancelBtn.innerText = "취소"; cancelBtn.onclick = closeModal;
      const confirmBtn = document.createElement('button'); confirmBtn.className = "flex-1 bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl"; confirmBtn.innerText = "확인"; confirmBtn.onclick = () => { closeModal(); if(onConfirm) onConfirm(); };
      btnContainer.appendChild(cancelBtn); btnContainer.appendChild(confirmBtn);
    } else {
      const okBtn = document.createElement('button'); okBtn.className = "w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl"; okBtn.innerText = "확인"; okBtn.onclick = closeModal; btnContainer.appendChild(okBtn);
    }
    modal.classList.remove('hidden');
    setTimeout(() => { content.classList.remove('scale-95','opacity-0'); content.classList.add('scale-100','opacity-100'); }, 10);
  };
  window.customAlert = (msg) => window.showModal('알림', msg, false);
  window.customConfirm = (msg, onConfirm) => window.showModal('확인', msg, true, onConfirm);

  // ---- 명단 공유 유틸 (localStorage, 같은 폴더의 다른 도구 페이지와 공유됩니다) ----
  window.ROSTER_KEY = 'sct_students_v1';
  window.getRoster = function(){
    const raw = localStorage.getItem(window.ROSTER_KEY);
    if (raw) return JSON.parse(raw);
    return ["김철수","이영희","박지민","최동훈","정수아","강민준","조윤서"];
  };
  window.setRoster = function(arr){ localStorage.setItem(window.ROSTER_KEY, JSON.stringify(arr)); };
  window.parseNames = function(text){ return text.split(/[\n,]+/).map(s=>s.trim()).filter(s=>s.length>0); };
</script>
<script>

    let isNoiseMeasuring=false, audioCtx=null, micStream=null, noiseRAF=null;
    function updateNoiseUI(level){
      const bar=document.getElementById('noiseLevelBar'), val=document.getElementById('noiseValue');
      const lG=document.getElementById('light-green'), lY=document.getElementById('light-yellow'), lR=document.getElementById('light-red');
      bar.style.width=level+'%'; val.innerText=level;
      lG.classList.add('opacity-20'); lY.classList.add('opacity-20'); lR.classList.add('opacity-20');
      bar.className='h-10 rounded-full transition-all duration-75 ';
      document.getElementById('tool-noise').style.backgroundColor='#fff';
      if(level<60){ bar.classList.add('bg-emerald-500'); lG.classList.remove('opacity-20'); }
      else if(level<85){ bar.classList.add('bg-amber-500'); lY.classList.remove('opacity-20'); }
      else { bar.classList.add('bg-rose-500'); lR.classList.remove('opacity-20'); document.getElementById('tool-noise').style.backgroundColor='#fff1f2'; }
    }
    window.toggleNoiseMeter=async function(forceStop=false){
      const btn=document.getElementById('btn-noise-toggle');
      if(isNoiseMeasuring||forceStop){
        isNoiseMeasuring=false;
        if(noiseRAF) cancelAnimationFrame(noiseRAF);
        if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
        if(audioCtx){ audioCtx.close().catch(()=>{}); audioCtx=null; }
        btn.innerHTML='<i class="fa-solid fa-microphone mr-2"></i> 마이크 켜기 / 측정 시작'; btn.classList.replace('bg-rose-500','bg-indigo-600');
        updateNoiseUI(0); return;
      }
      if(window.location.protocol!=='https:' && window.location.hostname!=='localhost'){
        window.customAlert("<b class='text-rose-500'>[접근 차단됨]</b><br><br>브라우저 보안 정책상 마이크는 <b>HTTPS 환경에서만 동작</b>합니다.<br>이 파일을 깃허브 페이지로 배포하시면 마이크 기능을 완벽하게 사용하실 수 있습니다!");
        return;
      }
      try{
        micStream=await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        if(audioCtx.state==='suspended') await audioCtx.resume();
        const source=audioCtx.createMediaStreamSource(micStream);
        const analyser=audioCtx.createAnalyser(); analyser.fftSize=512; source.connect(analyser);
        const dataArray=new Uint8Array(analyser.frequencyBinCount);
        isNoiseMeasuring=true;
        btn.innerHTML='<i class="fa-solid fa-stop mr-2"></i> 측정 정지'; btn.classList.replace('bg-indigo-600','bg-rose-500');
        const loop=()=>{
          if(!isNoiseMeasuring) return;
          analyser.getByteTimeDomainData(dataArray);
          let sumSquares=0; for(let i=0;i<dataArray.length;i++){ const v=(dataArray[i]-128)/128; sumSquares+=v*v; }
          const rms=Math.sqrt(sumSquares/dataArray.length);
          updateNoiseUI(Math.min(Math.floor(rms*500),100));
          noiseRAF=requestAnimationFrame(loop);
        };
        loop();
      }catch(e){
        isNoiseMeasuring=false;
        if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'||e.name==='SecurityError') window.customAlert("마이크 접근 권한이 거부되었습니다.<br><br>주소창 왼쪽 자물쇠 아이콘을 눌러 마이크 권한을 '허용'으로 바꾼 뒤 다시 시도해주세요.");
        else if(e.name==='NotFoundError'||e.name==='DevicesNotFoundError') window.customAlert("연결된 마이크를 찾을 수 없습니다. 마이크가 연결되어 있는지 확인해주세요.");
        else window.customAlert(`마이크를 실행할 수 없습니다.<br><br><span class="text-xs text-slate-400">(${e.message||e})</span>`);
      }
    };
  
</script>
</body>
</html>
