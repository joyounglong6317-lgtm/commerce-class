<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랜덤 뽑기 · 스마트 수업 도구</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  .coin-container { perspective: 1000px; width: 150px; height: 150px; margin: 0 auto; }
  .coin { width: 100%; height: 100%; position: relative; transition: transform 3s cubic-bezier(0.4, 2, 0.2, 1); transform-style: preserve-3d; }
  .coin.flip-heads { transform: rotateY(1800deg); }
  .coin.flip-tails { transform: rotateY(1980deg); }
  .coin-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; border: 8px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .coin-front { background: linear-gradient(135deg, #fef08a 0%, #eab308 100%); color: #854d0e; border-color: #ca8a04; }
  .coin-back { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%); color: #334155; transform: rotateY(180deg); border-color: #64748b; }
  #drawing-container canvas { border-radius: 0.75rem; touch-action: none; display: block; }
  .bracket-connector { position: relative; }
  .bracket-connector::after { content: ''; position: absolute; right: -1rem; top: 50%; width: 1rem; border-bottom: 2px solid #cbd5e1; }
  
</style>
</head>
<body class="min-h-screen text-slate-800">

<!-- 상단 바 -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-5xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center text-slate-500 hover:text-indigo-600 transition-colors font-bold text-sm">
      <i class="fa-solid fa-arrow-left mr-2"></i> 도구 모음으로
    </a>
    <div class="flex items-center">
      <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 mr-2"><i class="fa-solid fa-shuffle"></i></div>
      <span class="font-bold text-slate-700">랜덤 뽑기</span>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto p-4 md:p-8">
  
    
<div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 mb-8">
  <div class="flex items-center justify-between mb-3">
    <label class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-users mr-2 text-slate-400"></i>명단 (줄바꿈 또는 쉼표로 구분)</label>
    <span id="rosterCount" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">0명</span>
  </div>
  <textarea id="rosterInput" class="w-full h-28 p-4 border border-slate-300 rounded-xl outline-none resize-y text-sm leading-relaxed" placeholder="김철수&#10;이영희&#10;박지민"></textarea>
  <button onclick="window.saveRosterInput()" class="mt-3 bg-slate-800 hover:bg-slate-900 text-white text-sm font-bold py-2 px-6 rounded-xl">명단 저장</button>
  <p class="text-xs text-slate-400 mt-2">※ 이 명단은 같은 폴더의 랜덤뽑기·돌림판·모둠짜기·대진표 도구가 함께 사용합니다.</p>
</div>
    <section class="text-center bg-white p-6 md:p-12 rounded-3xl shadow-sm border border-slate-200">
      <h2 class="text-3xl font-bold mb-10 text-slate-800"><i class="fa-solid fa-shuffle text-indigo-500 mr-3"></i>랜덤 뽑기</h2>
      <div class="bg-slate-50 rounded-[2.5rem] border-4 border-dashed border-slate-200 py-16 md:py-24 mb-10 flex flex-col items-center justify-center min-h-[220px]">
        <div class="mb-6">
          <label class="inline-flex items-center gap-2 text-sm font-bold text-slate-500 bg-white px-4 py-2 rounded-full border border-slate-200 cursor-pointer">
            <input type="checkbox" id="excludePicked" class="w-4 h-4">
            <span>뽑힌 학생 제외하기</span>
          </label>
        </div>
        <span id="randomResult" class="text-6xl md:text-9xl font-black text-slate-300 tracking-tight transition-all duration-300">대기 중</span>
      </div>
      <div class="flex flex-col sm:flex-row justify-center gap-4">
        <button onclick="window.pickRandomStudent()" class="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white text-2xl font-bold py-5 px-16 rounded-full shadow-xl shadow-indigo-500/30">뽑기 시작!</button>
        <button onclick="window.resetPickedStudents()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-5 px-8 rounded-full shadow-sm text-lg">제외 기록 초기화</button>
      </div>
    </section>
</main>

<!-- 커스텀 모달 -->
<div id="customModal" class="hidden fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center backdrop-blur-sm">
  <div id="customModalContent" class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 opacity-0 transition-all duration-200">
    <div id="modalIcon" class="w-16 h-16 mx-auto bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl mb-4"><i class="fa-solid fa-bell"></i></div>
    <h3 id="modalTitle" class="text-xl font-bold mb-2 text-center text-slate-800">알림</h3>
    <p id="modalMessage" class="text-slate-600 mb-8 text-center text-sm md:text-base leading-relaxed"></p>
    <div class="flex justify-center gap-3" id="modalButtons"></div>
  </div>
</div>

<script>
  window.showModal = function(title, message, isConfirm = false, onConfirm = null) {
    const modal = document.getElementById('customModal'), content = document.getElementById('customModalContent'),
          btnContainer = document.getElementById('modalButtons'), iconEl = document.getElementById('modalIcon'),
          titleEl = document.getElementById('modalTitle'), msgEl = document.getElementById('modalMessage');
    titleEl.innerText = title; msgEl.innerHTML = message; btnContainer.innerHTML = '';
    if (isConfirm) {
      iconEl.className = "w-16 h-16 mx-auto bg-amber-100 text-amber-600 rounded-full flex items-center justify-center text-3xl mb-4";
      iconEl.innerHTML = '<i class="fa-solid fa-circle-question"></i>';
    } else {
      iconEl.className = "w-16 h-16 mx-auto bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl mb-4";
      iconEl.innerHTML = '<i class="fa-solid fa-bell"></i>';
    }
    const closeModal = () => { content.classList.remove('scale-100','opacity-100'); content.classList.add('scale-95','opacity-0'); setTimeout(()=>modal.classList.add('hidden'),200); };
    if (isConfirm) {
      const cancelBtn = document.createElement('button'); cancelBtn.className = "flex-1 bg-slate-100 text-slate-700 font-bold py-3 px-4 rounded-xl"; cancelBtn.innerText = "취소"; cancelBtn.onclick = closeModal;
      const confirmBtn = document.createElement('button'); confirmBtn.className = "flex-1 bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl"; confirmBtn.innerText = "확인"; confirmBtn.onclick = () => { closeModal(); if(onConfirm) onConfirm(); };
      btnContainer.appendChild(cancelBtn); btnContainer.appendChild(confirmBtn);
    } else {
      const okBtn = document.createElement('button'); okBtn.className = "w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl"; okBtn.innerText = "확인"; okBtn.onclick = closeModal; btnContainer.appendChild(okBtn);
    }
    modal.classList.remove('hidden');
    setTimeout(() => { content.classList.remove('scale-95','opacity-0'); content.classList.add('scale-100','opacity-100'); }, 10);
  };
  window.customAlert = (msg) => window.showModal('알림', msg, false);
  window.customConfirm = (msg, onConfirm) => window.showModal('확인', msg, true, onConfirm);

  // ---- 명단 공유 유틸 (localStorage, 같은 폴더의 다른 도구 페이지와 공유됩니다) ----
  window.ROSTER_KEY = 'sct_students_v1';
  window.getRoster = function(){
    const raw = localStorage.getItem(window.ROSTER_KEY);
    if (raw) return JSON.parse(raw);
    return ["김철수","이영희","박지민","최동훈","정수아","강민준","조윤서"];
  };
  window.setRoster = function(arr){ localStorage.setItem(window.ROSTER_KEY, JSON.stringify(arr)); };
  window.parseNames = function(text){ return text.split(/[\n,]+/).map(s=>s.trim()).filter(s=>s.length>0); };
</script>
<script>

  function loadRosterIntoBox(){
    const arr = window.getRoster();
    document.getElementById('rosterInput').value = arr.join('\n');
    document.getElementById('rosterCount').innerText = arr.length + '명';
  }
  window.saveRosterInput = function(silent){
    const arr = window.parseNames(document.getElementById('rosterInput').value);
    window.setRoster(arr);
    document.getElementById('rosterCount').innerText = arr.length + '명';
    if(!silent) window.customAlert('명단이 저장되었습니다! (' + arr.length + '명)');
    return arr;
  };
  document.addEventListener('DOMContentLoaded', loadRosterIntoBox);

    let excludePickedList = [];
    window.pickRandomStudent = function(){
      const studentArray = window.saveRosterInput(true);
      if(studentArray.length===0) return window.customAlert('위 명단 칸에 학생 이름을 먼저 입력하고 저장해주세요.');
      const isExclude = document.getElementById('excludePicked').checked;
      let avail = studentArray;
      if(isExclude){
        avail = studentArray.filter(s=>!excludePickedList.includes(s));
        if(avail.length===0){ window.customAlert('모든 학생이 한 번씩 뽑혔습니다. 명단을 다시 활성화합니다.'); excludePickedList=[]; avail=studentArray; }
      }
      const resultEl=document.getElementById('randomResult');
      resultEl.classList.remove('text-indigo-600','scale-110'); resultEl.classList.add('text-slate-300');
      let counter=0; const shuffleInterval=setInterval(()=>{
        resultEl.innerText = avail[Math.floor(Math.random()*avail.length)];
        resultEl.classList.add('text-slate-500'); counter++;
        if(counter>=15){
          clearInterval(shuffleInterval);
          const picked = avail[Math.floor(Math.random()*avail.length)];
          if(isExclude) excludePickedList.push(picked);
          resultEl.innerText = `🎉 ${picked} 🎉`;
          resultEl.classList.remove('text-slate-500','text-slate-300'); resultEl.classList.add('text-indigo-600','scale-110');
        }
      },60);
    };
    window.resetPickedStudents = function(){
      excludePickedList=[];
      const resultEl=document.getElementById('randomResult');
      resultEl.innerText="초기화됨"; resultEl.classList.remove('text-indigo-600','scale-110'); resultEl.classList.add('text-slate-300');
      window.customAlert('뽑힌 학생 기록이 초기화되어 다시 모두가 포함됩니다.');
    };
  
</script>
</body>
</html>
